<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: rgba(0, 0, 0, 0.08);
      --link: #0071e3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(15px, 0.3vw + 14px, 18px);
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    .wrap {
      max-width: min(56rem, 100%);
      margin: 0 auto;
      padding: clamp(24px, 3vw, 48px) clamp(16px, 3vw, 40px) 64px;
    }
    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--link);
      text-decoration: none;
      font-weight: 500;
    }
    .back:hover { text-decoration: underline; }
    h1.t {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 1.2vw + 1.1rem, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .sub {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .readme {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: clamp(20px, 2.5vw, 36px) clamp(18px, 2.5vw, 40px);
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.04);
    }
    .readme :is(h1, h2, h3) { margin: 1.4em 0 0.5em; line-height: 1.3; }
    .readme h1 { font-size: 1.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.35em; }
    .readme h2 { font-size: 1.25rem; color: #111; }
    .readme h3 { font-size: 1.05rem; }
    .readme p, .readme li { color: #3f3f46; }
    .readme code {
      font-size: 0.88em;
      padding: 0.12em 0.4em;
      border-radius: 4px;
      background: #f4f4f5;
      border: 1px solid #e4e4e7;
    }
    .readme pre {
      overflow: auto;
      padding: 14px 16px;
      border-radius: 8px;
      background: #18181b;
      color: #e4e4e7;
      font-size: 0.82rem;
    }
    .readme pre code { background: none; border: 0; color: inherit; padding: 0; }
    .readme table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 1em 0; }
    .readme th, .readme td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
    .readme th { background: #fafafa; }
    .readme-fallback { white-space: pre-wrap; font-size: 0.88rem; }
    .readme a { color: var(--link); }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← 返回主界面</a>
    <h1 class="t">{{ title }}</h1>
    <p class="sub">仓库内 README 的在线阅读版；表格与代码块需安装 <code>markdown</code> 包时渲染更佳。</p>
    <article class="readme">{{ body_html|safe }}</article>
  </div>
</body>
</html>
